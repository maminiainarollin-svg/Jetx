<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JetX Predictor Ultimate - Mada</title>
    <style>
        :root {
            --primary: #ffde00; --bg: #0a0a0a; --card: #1a1a1a;
            --win: #4ade80; --loss: #f87171; --dim: #94a3b8;
        }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 12px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 420px; }
        
        /* Header Statut */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; background: var(--card); padding: 10px 15px; border-radius: 12px; border: 1px solid #333; }
        .balance-chip { font-weight: bold; color: var(--primary); font-size: 1.1rem; }
        .reset-btn { background: #333; color: white; border: none; padding: 4px 8px; border-radius: 5px; font-size: 0.7rem; cursor: pointer; }

        /* Zone de Signal */
        .signal-card { background: linear-gradient(180deg, #1a1a1a 0%, #000 100%); border-radius: 20px; padding: 25px 15px; text-align: center; border: 1px solid #444; margin-bottom: 12px; position: relative; overflow: hidden; }
        #signalTime { font-size: 4rem; font-weight: 900; color: var(--primary); line-height: 1; margin: 5px 0; text-shadow: 0 0 15px rgba(255, 222, 0, 0.3); }
        .status-label { font-size: 0.7rem; color: var(--dim); text-transform: uppercase; letter-spacing: 2px; }

        /* Stratégie Double Mise */
        .bet-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .bet-box { background: rgba(255, 222, 0, 0.05); border: 1px solid rgba(255, 222, 0, 0.2); border-radius: 12px; padding: 10px; text-align: center; }
        .bet-amt { font-size: 1.2rem; font-weight: bold; display: block; margin-bottom: 2px; }
        .bet-target { font-size: 0.75rem; color: var(--primary); font-weight: bold; background: rgba(255,222,0,0.1); padding: 2px 5px; border-radius: 4px; }

        /* Contrôles */
        .input-group { background: var(--card); padding: 12px; border-radius: 12px; margin-bottom: 12px; border: 1px solid #333; }
        .field { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; font-size: 0.85rem; }
        input { background: #000; border: 1px solid #444; color: var(--primary); padding: 6px; border-radius: 6px; width: 90px; text-align: center; font-weight: bold; }
        
        .btn { width: 100%; padding: 16px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; transition: 0.2s; }
        .btn-primary { background: var(--primary); color: black; margin-bottom: 10px; box-shadow: 0 4px 0 #b39b00; }
        .btn-primary:active { transform: translateY(3px); box-shadow: none; }
        
        .action-row { display: flex; gap: 10px; }
        .btn-win { background: var(--win); color: black; flex: 1; }
        .btn-lose { background: var(--loss); color: black; flex: 1; }

        /* Alertes & Historique */
        #alertBox { display: none; background: var(--loss); color: white; padding: 10px; border-radius: 8px; margin-bottom: 10px; font-weight: bold; text-align: center; font-size: 0.8rem; }
        .hist-card { background: var(--card); border-radius: 12px; padding: 12px; border: 1px solid #333; }
        .hist-list { max-height: 100px; overflow-y: auto; font-size: 0.8rem; }
        .hist-item { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px dotted #444; }

        /* Animation */
        .loading { animation: pulse 0.8s infinite; font-size: 1.5rem !important; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <div id="alertBox">⚠️ SÉRIE NOIRE : FAITES UNE PAUSE DE 15 MIN !</div>

    <div class="header">
        <div>
            <div style="font-size: 0.6rem; color: var(--dim);">SOLDE ACTUEL</div>
            <div class="balance-chip"><span id="bal">2138</span> MGA</div>
        </div>
        <button class="reset-btn" onclick="resetApp()">RÉINITIALISER</button>
    </div>

    <div class="input-group">
        <div class="field">
            <span>Dépôt de session :</span>
            <input type="number" id="startBal" value="2138" oninput="updateBase()">
        </div>
        <div class="field" style="color: var(--win); font-size: 0.75rem;">
            <span>Objectif Gain (+40%) :</span>
            <span id="targetLabel">855 MGA</span>
        </div>
    </div>

    <div class="signal-card">
        <div class="status-label">Signal estimé</div>
        <div id="signalTime">--:--</div>
        
        <div class="bet-row">
            <div class="bet-box">
                <span class="bet-amt" id="m1">200</span>
                <span class="bet-target">Auto 1.50x</span>
            </div>
            <div class="bet-box">
                <span class="bet-amt" id="m2">200</span>
                <span class="bet-target" id="t2">Auto 2.00x</span>
            </div>
        </div>

        <button class="btn btn-primary" id="mainBtn" onclick="getSignal()">GÉNÉRER UN SIGNAL</button>
        
        <div class="action-row">
            <button class="btn btn-win" onclick="handleResult(true)">GAIN</button>
            <button class="btn btn-lose" onclick="handleResult(false)">PERTE</button>
        </div>
    </div>

    <div class="hist-card">
        <div class="status-label" style="margin-bottom: 8px;">Historique Session</div>
        <div id="hist" class="hist-list"></div>
    </div>
</div>

<script>
    let bal = 2138;
    let startBal = 2138;
    let currentTotalBet = 400;
    let lossStreak = 0;

    function updateBase() {
        startBal = parseFloat(document.getElementById('startBal').value) || 0;
        bal = startBal;
        document.getElementById('targetLabel').innerText = Math.floor(startBal * 0.4) + " MGA";
        updateUI();
    }

    function updateUI() {
        document.getElementById('bal').innerText = Math.floor(bal).toLocaleString();
        
        // Alerte si perte de 30% ou série de 3 pertes
        const stopLoss = bal < (startBal * 0.7);
        if (stopLoss || lossStreak >= 3) {
            document.getElementById('alertBox').style.display = "block";
            document.getElementById('mainBtn').style.opacity = "0.5";
        } else {
            document.getElementById('alertBox').style.display = "none";
            document.getElementById('mainBtn').style.opacity = "1";
        }
    }

    function getSignal() {
        const time = document.getElementById('signalTime');
        time.innerText = "CALCUL...";
        time.classList.add('loading');
        
        setTimeout(() => {
            time.classList.remove('loading');
            const d = new Date();
            d.setMinutes(d.getMinutes() + Math.floor(Math.random() * 4) + 1);
            time.innerText = d.getHours().toString().padStart(2,'0') + ":" + d.getMinutes().toString().padStart(2,'0');

            // Cible raisonnable entre 1.6 et 2.5
            const c2 = (Math.random() * (2.5 - 1.6) + 1.6).toFixed(2);
            document.getElementById('t2').innerText = "Auto " + c2 + "x";

            // Gestion Mise (Min 200, sinon 2% du solde)
            let unit = Math.max(200, Math.floor(bal * 0.02));
            currentTotalBet = unit * 2;
            document.getElementById('m1').innerText = unit;
            document.getElementById('m2').innerText = unit;
        }, 1000);
    }

    function handleResult(win) {
        if (win) {
            const c2 = parseFloat(document.getElementById('t2').innerText.split(' ')[1]);
            const unit = currentTotalBet / 2;
            const profit = (unit * 1.5) + (unit * c2) - currentTotalBet;
            bal += profit;
            lossStreak = 0;
            addHist("GAIN", profit);
        } else {
            bal -= currentTotalBet;
            lossStreak++;
            addHist("PERTE", -currentTotalBet);
        }
        updateUI();
    }

    function addHist(type, amt) {
        const item = document.createElement('div');
        item.className = 'hist-item';
        item.innerHTML = `<span>${type}</span><span style="color:${amt>0?'var(--win)':'var(--loss)'}">${amt.toLocaleString()} MGA</span>`;
        const list = document.getElementById('hist');
        list.insertBefore(item, list.firstChild);
    }

    function resetApp() {
        if(confirm("Réinitialiser la session ?")) {
            location.reload();
        }
    }

    updateBase();
</script>
</body>
</html>
