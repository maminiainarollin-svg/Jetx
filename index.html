<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JetX Strategy Pro - Min 200Ar</title>
    <style>
        :root {
            --bg: #0f172a; --card: #1e293b; --primary: #38bdf8;
            --accent: #4ade80; --danger: #f87171; --text-dim: #94a3b8;
        }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 450px; }
        .card { background: var(--card); border-radius: 16px; padding: 20px; border: 1px solid rgba(56,189,248,0.2); margin-bottom: 15px; }
        h2 { font-size: 0.85rem; color: var(--primary); margin: 0 0 15px 0; text-transform: uppercase; letter-spacing: 1px; }
        
        /* Dashboard */
        .grid-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .stat-box { background: rgba(0,0,0,0.2); padding: 12px; border-radius: 10px; text-align: center; }
        .stat-val { font-size: 1.1rem; font-weight: bold; display: block; }
        .stat-label { font-size: 0.65rem; color: var(--text-dim); }

        /* Signal */
        #signalDisplay { font-size: 3.5rem; font-weight: bold; color: var(--accent); margin: 5px 0; text-align: center; }
        .target-text { text-align: center; color: var(--text-dim); font-size: 0.9rem; margin-bottom: 15px; }

        /* Double Mise */
        .double-bet-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 15px 0; }
        .bet-box { background: rgba(56, 189, 248, 0.1); border: 1px solid var(--primary); padding: 10px; border-radius: 12px; text-align: center; }
        .bet-amount { font-size: 1.2rem; font-weight: bold; color: white; display: block; margin: 5px 0; }
        .bet-target { font-size: 0.8rem; color: var(--primary); font-weight: bold; }

        /* Inputs */
        input { background: #0f172a; border: 1px solid #334155; color: white; padding: 8px; border-radius: 6px; width: 110px; text-align: center; font-weight: bold; }
        .input-group { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 0.85rem; }
        .auto-info { font-size: 0.7rem; color: var(--accent); margin-top: -5px; margin-bottom: 10px; text-align: right; }

        .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-main { background: var(--primary); color: var(--bg); margin-bottom: 15px; }
        .btn-win { background: var(--accent); color: var(--bg); width: 48%; }
        .btn-lose { background: var(--danger); color: white; width: 48%; }
        .row { display: flex; justify-content: space-between; gap: 10px; }

        #warningZone { display: none; background: var(--danger); color: white; padding: 15px; border-radius: 10px; margin-bottom: 15px; font-weight: bold; text-align: center; }
        .scanning { animation: pulse 1s infinite; font-size: 1.5rem !important; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    </style>
</head>
<body>

<div class="container">
    <div id="warningZone">🚨 SESSION TERMINÉE !</div>

    <div class="card">
        <h2>Paramètres de Session</h2>
        <div class="input-group">
            <span>Budget (Ar) :</span>
            <input type="number" id="budgetInput" value="10000" oninput="autoCalc()">
        </div>
        <div class="auto-info">Objectifs Auto (40% gain / 30% perte)</div>
        
        <div class="input-group" style="opacity: 0.7;">
            <span>Objectif Gain :</span>
            <input type="number" id="targetInput" readonly>
        </div>
        <div class="input-group" style="opacity: 0.7;">
            <span>Limite Perte :</span>
            <input type="number" id="stopLossInput" readonly>
        </div>
    </div>

    <div class="card">
        <div class="grid-stats">
            <div class="stat-box"><span class="stat-label">SOLDE</span><span id="currentBalance" class="stat-val">0</span></div>
            <div class="stat-box"><span class="stat-label">P/L</span><span id="pnlDisplay" class="stat-val">0</span></div>
        </div>

        <div id="signalDisplay">--:--</div>
        <div class="target-text">Analyse temps réel</div>

        <div class="double-bet-container">
            <div class="bet-box">
                <span class="stat-label">MISE 1</span>
                <span id="bet1Amount" class="bet-amount">0 Ar</span>
                <span class="bet-target">Sortie : 1.50x</span>
            </div>
            <div class="bet-box">
                <span class="stat-label">MISE 2</span>
                <span id="bet2Amount" class="bet-amount">0 Ar</span>
                <span id="bet2Target" class="bet-target">Sortie : 2.00x</span>
            </div>
        </div>

        <button class="btn btn-main" id="signalBtn" onclick="generateSignal()">GÉNÉRER SIGNAL</button>

        <div class="row">
            <button class="btn btn-win" onclick="updateBalance(true)">GAGNÉ</button>
            <button class="btn btn-lose" onclick="updateBalance(false)">PERDU</button>
        </div>
    </div>
</div>

<script>
    let initialBudget = 10000;
    let currentBalance = 10000;
    let currentBetTotal = 0;
    const MIN_BET = 200; // Limite Bet261

    function autoCalc() {
        const val = parseFloat(document.getElementById('budgetInput').value) || 0;
        initialBudget = val;
        currentBalance = val;
        
        document.getElementById('targetInput').value = Math.floor(val * 0.40);
        document.getElementById('stopLossInput').value = Math.floor(val * 0.30);
        
        updateUI();
    }

    function updateUI() {
        const pnl = currentBalance - initialBudget;
        document.getElementById('currentBalance').innerText = currentBalance.toLocaleString() + " Ar";
        document.getElementById('pnlDisplay').innerText = (pnl > 0 ? "+" : "") + pnl.toLocaleString();
        document.getElementById('pnlDisplay').style.color = pnl >= 0 ? "var(--accent)" : "var(--danger)";

        const target = parseFloat(document.getElementById('targetInput').value);
        const stopLoss = parseFloat(document.getElementById('stopLossInput').value);

        if ((pnl >= target || pnl <= -stopLoss) && initialBudget > 0) {
            document.getElementById('warningZone').style.display = "block";
            document.getElementById('signalBtn').disabled = true;
        } else {
            document.getElementById('warningZone').style.display = "none";
            document.getElementById('signalBtn').disabled = false;
        }
    }

    function generateSignal() {
        const display = document.getElementById('signalDisplay');
        display.innerText = "ANALYSE...";
        display.classList.add('scanning');

        setTimeout(() => {
            display.classList.remove('scanning');
            const now = new Date();
            now.setMinutes(now.getMinutes() + Math.floor(Math.random() * 5) + 2);
            display.innerText = String(now.getHours()).padStart(2,'0') + ":" + String(now.getMinutes()).padStart(2,'0');

            const coteTarget = (Math.random() * (2.4 - 1.6) + 1.6).toFixed(2);
            document.getElementById('bet2Target').innerText = "Sortie : " + coteTarget + "x";

            // Calcul mise (2.5% du capital ou 200 Ar minimum)
            let unit = Math.floor(currentBalance * 0.025);
            if (unit < MIN_BET) unit = MIN_BET;
            
            currentBetTotal = unit * 2;
            
            document.getElementById('bet1Amount').innerText = unit.toLocaleString() + " Ar";
            document.getElementById('bet2Amount').innerText = unit.toLocaleString() + " Ar";
        }, 1000);
    }

    function updateBalance(isWin) {
        if(currentBetTotal === 0) return;
        const unit = currentBetTotal / 2;
        const cote2 = parseFloat(document.getElementById('bet2Target').innerText.replace('Sortie : ', ''));

        if (isWin) {
            const profit = Math.floor((unit * 1.5) + (unit * cote2)) - currentBetTotal;
            currentBalance += profit;
        } else {
            currentBalance -= currentBetTotal;
        }
        updateUI();
    }

    autoCalc();
</script>
</body>
</html>
