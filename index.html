<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JetX Predictor Sim</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .card { background: #1e293b; border-radius: 15px; padding: 20px; margin-top: 20px; border: 1px solid #38bdf8; }
        .btn { background: #38bdf8; color: #0f172a; border: none; padding: 10px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .signal { font-size: 2em; color: #4ade80; margin: 15px 0; }
        .time { color: #94a3b8; }
    </style>
</head>
<body>
    <h1>JetX Predictor</h1>
    <div class="card">
        <p>Prochain Signal de Confiance :</p>
        <div id="signalDisplay" class="signal">--:--</div>
        <p class="time">Cote suggérée : <span id="cote">1.50x</span></p>
        <button class="btn" onclick="generateSignal()">Générer Nouveau Signal</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
