<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JetX Predictor Pro</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --primary: #38bdf8;
            --accent: #4ade80;
            --text-dim: #94a3b8;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 400px;
        }

        h1 {
            font-size: 1.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--primary);
            margin-bottom: 20px;
        }

        .card {
            background: var(--card);
            border-radius: 16px;
            padding: 24px;
            border: 1px solid rgba(56, 189, 248, 0.2);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3);
            text-align: center;
            margin-bottom: 20px;
        }

        .signal-label {
            color: var(--text-dim);
            font-size: 0.9rem;
            margin-bottom: 8px;
        }

        #signalDisplay {
            font-size: 3rem;
            font-weight: bold;
            color: var(--accent);
            margin: 10px 0;
            min-height: 70px;
        }

        .prediction-info {
            font-size: 1.1rem;
            margin-bottom: 20px;
        }

        #cote {
            color: var(--primary);
            font-weight: bold;
        }

        .btn {
            background: var(--primary);
            color: var(--bg);
            border: none;
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* Historique */
        .history-section {
            width: 100%;
            text-align: left;
        }

        .history-title {
            font-size: 1rem;
            color: var(--text-dim);
            margin-bottom: 10px;
            padding-left: 5px;
        }

        .history-item {
            background: rgba(30, 41, 59, 0.5);
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 3px solid var(--primary);
            font-size: 0.9rem;
        }

        .history-time { font-weight: bold; }
        .history-cote { color: var(--accent); }

        /* Animations */
        .scanning {
            animation: pulse 1s infinite;
            font-size: 1.5rem !important;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.4; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>JetX Predictor</h1>

        <div class="card">
            <div class="signal-label">PROCHAIN DÉCOLLAGE ESTIMÉ</div>
            <div id="signalDisplay">--:--</div>
            <div class="prediction-info">Objectif : <span id="cote">1.00x</span></div>
            <button class="btn" onclick="generateSignal()">OBTENIR UN SIGNAL</button>
        </div>

        <div class="history-section">
            <div class="history-title">Historique des signaux</div>
            <div id="historyList">
                </div>
        </div>
    </div>

    <script>
        // Enregistrement du Service Worker pour la PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        function generateSignal() {
            const display = document.getElementById('signalDisplay');
            const btn = document.querySelector('.btn');
            
            // Verrouiller le bouton pendant l'analyse
            btn.disabled = true;
            btn.style.opacity = "0.5";
            display.innerText = "ANALYSE EN COURS...";
            display.classList.add('scanning');

            setTimeout(() => {
                display.classList.remove('scanning');
                btn.disabled = false;
                btn.style.opacity = "1";

                // Calcul de l'heure (Maintenant + 2 à 10 minutes)
                const now = new Date();
                const wait = Math.floor(Math.random() * 8) + 2;
                now.setMinutes(now.getMinutes() + wait);
                
                const h = String(now.getHours()).padStart(2, '0');
                const m = String(now.getMinutes()).padStart(2, '0');
                const timeStr = `${h}:${m}`;

                // Calcul de la cote (Entre 1.20 et 2.80)
                const coteVal = (Math.random() * (2.8 - 1.2) + 1.2).toFixed(2);
                const coteStr = `${coteVal}x`;

                // Mise à jour de l'affichage
                display.innerText = timeStr;
                document.getElementById('cote').innerText = coteStr;

                // Ajouter à l'historique
                addToHistory(timeStr, coteStr);

            }, 2000);
        }

        function addToHistory(time, cote) {
            const list = document.getElementById('historyList');
            const item = document.createElement('div');
            item.className = 'history-item';
            item.innerHTML = `
                <span class="history-time">Heure : ${time}</span>
                <span class="history-cote">Cote : ${cote}</span>
            `;
            
            // Insérer au début de la liste
            list.insertBefore(item, list.firstChild);

            // Garder seulement les 5 derniers
            if (list.children.length > 5) {
                list.removeChild(list.lastChild);
            }
        }
    </script>
</body>
</html>
